[defaults]
inventory = inventory.ini
host_key_checking = False
interpreter_python = /usr/bin/python3
vault_password_file = ~/.gen8_vault_pass
# Increase timeout for slower Gen8 BIOS/Initial handshakes
timeout = 30
remote_tmp = /tmp/.ansible-${USER}/tmp

[privilege_escalation]
become = True
become_method = sudo
# become_ask_pass = True  # Removed this after adding NOPASSWD in sudoers

[ssh_connection]
# Pipelining reduces the number of SSH connections, fixing many 'sudo' hangs
pipelining = True
# Disable problematic multiplexing for WSL2
ssh_args = -o ControlMaster=no
# Force a TTY for sudo prompts
scp_if_ssh = True
