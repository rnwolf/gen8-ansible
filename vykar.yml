---
- name: Deploy Vykar Backup Server (Native Binary)
  hosts: gen8
  become: yes
  vars_files:
    - vars/main.yml
    - vars/secrets.yml

  tasks:

    # --- USER & DIRECTORIES ---

    - name: Create vykar system user
      user:
        name: vykar
        system: yes
        shell: /sbin/nologin
        home: "{{ services.vykar.ssd_path }}"
        create_home: no

    - name: Ensure SSD config directory exists
      file:
        path: "{{ services.vykar.ssd_path }}"
        state: directory
        owner: vykar
        group: vykar
        mode: '0750'

    - name: Ensure ZFS data directory exists and is owned by vykar
      file:
        path: "{{ services.vykar.zfs_path }}"
        state: directory
        owner: vykar
        group: vykar
        mode: '0750'

    - name: Ensure Caddy log file exists for Vykar
      file:
        path: /var/log/caddy/vykar.log
        state: touch
        owner: caddy
        group: caddy
        mode: '0640'
        modification_time: preserve
        access_time: preserve

    # --- BINARY ---

    - name: Get latest Vykar release info from GitHub
      uri:
        url: https://api.github.com/repos/borgbase/vykar/releases/latest
        return_content: yes
        headers:
          Accept: "application/vnd.github+json"
      register: vykar_release

    - name: Extract linux x86_64 gnu download URL
      set_fact:
        vykar_download_url: >-
          {{ vykar_release.json.assets
            | selectattr('name', 'match', '.*x86_64-unknown-linux-gnu.*')
            | map(attribute='browser_download_url')
            | first }}
        vykar_version: "{{ vykar_release.json.tag_name }}"

    - name: Download and extract Vykar tarball
      unarchive:
        src: "{{ vykar_download_url }}"
        dest: /tmp
        remote_src: yes
        creates: /tmp/vykar-server

    - name: Install vykar-server binary
      copy:
        src: /tmp/vykar-server
        dest: /usr/local/bin/vykar-server
        mode: '0755'
        remote_src: yes

    # --- CONFIGURATION ---

    - name: Deploy Vykar environment file (contains token)
      template:
        src: templates/vykar-server.env.j2
        dest: "{{ services.vykar.ssd_path }}/vykar-server.env"
        owner: vykar
        group: vykar
        mode: '0600'
      notify: Restart Vykar

    - name: Deploy Vykar systemd service unit
      template:
        src: templates/vykar-server.service.j2
        dest: /etc/systemd/system/vykar-server.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload Systemd
        - Restart Vykar

    - name: Flush handlers (so daemon-reload runs before service start)
      meta: flush_handlers

    - name: Enable and start Vykar service
      systemd:
        name: vykar-server
        state: started
        enabled: yes

    # --- SMOKE TEST ---

    - name: Wait for Vykar health endpoint to respond
      uri:
        url: "http://localhost:8585/health"
        status_code: 200
      retries: 5
      delay: 3

    # --- CADDY ---

    - name: Deploy Vykar Caddy config
      template:
        src: templates/vykar-caddy.j2
        dest: /etc/caddy/conf.d/vykar
        owner: root
        group: root
        mode: '0644'
      notify: Reload Caddy

    - name: Validate Caddy config
      command: caddy validate --config /etc/caddy/Caddyfile
      changed_when: false
      environment:
        CF_API_TOKEN: "{{ vault_cloudflare_token }}"


  handlers:

    - name: Reload Systemd
      systemd:
        daemon_reload: yes

    - name: Restart Vykar
      service:
        name: vykar-server
        state: restarted

    - name: Reload Caddy
      service:
        name: caddy
        state: reloaded