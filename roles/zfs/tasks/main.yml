---
- name: Ensure ZFS utilities are installed
  ansible.builtin.package:
    name: zfsutils-linux
    state: present

# --- POOL MANAGEMENT ---

- name: Check if ZFS pool is already active
  ansible.builtin.command: "zpool list {{ pool_name }}"
  register: zfs_pool_active
  failed_when: false
  changed_when: false

- name: Check if ZFS pool is available for import
  ansible.builtin.command: "zpool import"
  register: zfs_pool_importable
  when: zfs_pool_active.rc != 0
  changed_when: false
  failed_when: false

- name: Import existing ZFS pool
  ansible.builtin.command: "zpool import -f {{ pool_name }}"
  when:
    - zfs_pool_active.rc != 0
    - pool_name in zfs_pool_importable.stdout
  changed_when: true

- name: Create ZFS pool if it does not exist
  ansible.builtin.command: >
    zpool create -f -o ashift=12
    -O acltype=posixacl -O xattr=sa -O dnodesize=auto
    -O compression=lz4 -O atime=off -O canmount=off
    {{ pool_name }} {{ device_id }}
  when:
    - zfs_pool_active.rc != 0
    - pool_name not in zfs_pool_importable.stdout
  changed_when: true

# --- DATASET MANAGEMENT ---

- name: Ensure global storage dataset exists
  community.general.zfs:
    name: "{{ zfs_global_storage }}"
    state: present
    extra_zfs_properties:
      mountpoint: "{{ zfs_global_storage_path }}"

- name: Ensure service datasets exist
  community.general.zfs:
    name: "{{ item.value.zfs_dataset }}"
    state: present
    extra_zfs_properties:
      mountpoint: "{{ item.value.zfs_path }}"
  loop: "{{ services | dict2items }}"
  when: item.value.zfs_dataset is defined

# --- PERMISSIONS ---

- name: Set ownership for global storage
  ansible.builtin.file:
    path: "{{ zfs_global_storage_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    state: directory
    mode: '0755'

- name: Set ownership for service datasets
  ansible.builtin.file:
    path: "{{ item.value.zfs_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    state: directory
    mode: '0755'
  loop: "{{ services | dict2items }}"
  when: item.value.zfs_path is defined

# --- ZFS SERVICES ---

- name: Ensure ZFS services are enabled for persistence
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - zfs-import-cache
    - zfs-mount
