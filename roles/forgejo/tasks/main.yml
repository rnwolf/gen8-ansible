---
- name: Verify Split-DNS configuration for Forgejo
  ansible.builtin.command: "getent hosts {{ services.forgejo.domain }}"
  register: forgejo_dns_check
  failed_when: ansible_host not in forgejo_dns_check.stdout
  changed_when: false

- name: Ensure storage paths exist for Forgejo
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ forgejo_uid }}"
    group: "{{ forgejo_gid }}"
    mode: '0755'
  loop:
    - "{{ services.forgejo.ssd_path }}"
    - "{{ services.forgejo.zfs_path }}"

- name: Pre-pull Forgejo image
  ansible.builtin.command: "podman pull {{ services.forgejo.image }}"
  register: forgejo_pull_result
  changed_when: "'already' not in forgejo_pull_result.stdout"
  async: 900
  poll: 10

- name: Deploy Forgejo Quadlet
  ansible.builtin.template:
    src: forgejo.container.j2
    dest: /etc/containers/systemd/forgejo.container
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Flush handlers (daemon-reload before service start)
  ansible.builtin.meta: flush_handlers

- name: Ensure Forgejo service is running
  ansible.builtin.systemd:
    name: forgejo
    state: started
    enabled: yes

- name: Ensure Caddy log file exists for Forgejo
  ansible.builtin.file:
    path: /var/log/caddy/forgejo.log
    state: touch
    owner: caddy
    group: caddy
    mode: '0640'
    modification_time: preserve
    access_time: preserve

- name: Deploy Caddy site config for Forgejo
  ansible.builtin.template:
    src: forgejo-caddy.j2
    dest: /etc/caddy/conf.d/forgejo
    owner: root
    group: root
    mode: '0644'
  notify: Reload Caddy

- name: Create Forgejo backup cron job (SSD to ZFS)
  ansible.builtin.cron:
    name: "Forgejo SSD to ZFS Backup"
    minute: "0"
    hour: "2"
    job: "/usr/bin/rsync -av --delete {{ services.forgejo.ssd_path }} {{ services.forgejo.zfs_path }}/ssd_backups/"
