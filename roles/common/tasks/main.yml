---
- name: Configure passwordless sudo for ansible user
  ansible.builtin.copy:
    content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ ansible_user }}"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'

- name: Expand LVM to use full SSD space
  ansible.builtin.shell: |
    lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
    resize2fs /dev/ubuntu-vg/ubuntu-lv
  register: common_lvm_result
  changed_when: "'already' in common_lvm_result.stdout == false"

- name: Ensure SSD mount point exists
  ansible.builtin.file:
    path: /storage
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Install essential system packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: yes

- name: Install essential diagnostic tools
  ansible.builtin.apt:
    name: "{{ common_diagnostic_packages }}"
    state: present

- name: Apply Netplan configuration
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/00-installer-config.yaml
    owner: root
    group: root
    mode: '0600'
  notify: Apply Netplan

- name: Prepare Quadlet directory for Podman services
  ansible.builtin.file:
    path: "{{ common_quadlet_dir }}"
    state: directory
    mode: '0755'
