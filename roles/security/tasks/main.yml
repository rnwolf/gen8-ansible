---
- name: Install security packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
    state: present
    update_cache: yes

- name: Configure SSH daemon hardening
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
  notify: Restart SSH

- name: Check current UFW routing rules
  ansible.builtin.command: ufw status verbose
  register: security_ufw_status
  changed_when: false

- name: Allow Podman routing to any physical interface
  ansible.builtin.command: ufw route allow in on podman0 out on any
  when: "'podman0' not in security_ufw_status.stdout"
  changed_when: true

- name: Allow essential TCP traffic
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ security_ufw_tcp_ports }}"

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Deploy Fail2Ban local configuration
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
    content: |
      [DEFAULT]
      bantime = {{ security_fail2ban_bantime }}
      findtime = {{ security_fail2ban_findtime }}
      maxretry = {{ security_fail2ban_maxretry }}

      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      backend = %(sshd_backend)s

      [caddy-auth]
      enabled = true
      port = http,https
      filter = caddy-auth
      logpath = /var/log/caddy/access.log
      maxretry = 10
  notify: Restart Fail2Ban

- name: Deploy Caddy auth filter for Fail2Ban
  ansible.builtin.copy:
    dest: /etc/fail2ban/filter.d/caddy-auth.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Definition]
      failregex = ^.*"remote_ip":"<HOST>".*"status":401.*$
                  ^.*"remote_ip":"<HOST>".*"status":403.*$
      ignoreregex =
  notify: Restart Fail2Ban
